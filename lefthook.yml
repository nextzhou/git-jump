pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt -- --check
    clippy:
      run: cargo clippy -- -D warnings
    shellcheck:
      glob: "shell/*.{sh,bash}"
      run: shellcheck {staged_files}
    shfmt:
      glob: "shell/*.{sh,bash}"
      run: shfmt -d -i 2 -ci -bn {staged_files}
    cargo-lock-sync:
      run: |
        if ! git diff --quiet Cargo.lock 2>/dev/null; then
          echo "Error: Cargo.lock has unstaged changes."
          echo "Stage it with: git add Cargo.lock"
          exit 1
        fi

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'; then
          echo "Commit message must follow Conventional Commits format:"
          echo "  <type>(<scope>): <description>"
          echo "  e.g., feat(jump): add fuzzy matching support"
          exit 1
        fi
